<div class="container py-5 d-flex justify-content-center align-items-center" style="min-height: calc(100vh - 350px);">
  <div class="card glass-card border-0 p-4 py-5 shadow w-100 animate-fade-in-up" style="max-width: 440px; border-radius: 24px;">
    <div class="text-center mb-4">
      <div class="d-inline-flex rounded-circle p-3 mb-2" style="background-color: rgba(16, 185, 129, 0.08); color: #10b981;">
        <span class="material-icons" style="font-size: 2.2rem;">lock_open</span>
      </div>
      <h3 class="fw-bold text-dark mt-2">Welcome Back</h3>
      <p class="text-muted small">Access your medication reminders and diagnostic checks.</p>
    </div>

    <!-- Google Sign-In Button -->
    <button type="button" class="btn-google mb-3" (click)="loginWithGoogle()">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="18px" height="18px">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.5 24c0-1.63-.15-3.2-.43-4.75H24v9h12.75c-.55 2.87-2.18 5.31-4.62 6.94l7.2 5.58C43.5 35.53 46.5 30.22 46.5 24z"/>
        <path fill="#FBBC05" d="M10.54 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24s.92 7.54 2.56 10.78l7.98-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.2-5.58c-2 1.34-4.55 2.14-8.69 2.14-6.26 0-11.57-4.22-13.46-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      <span>Continue with Google</span>
    </button>

    <div class="d-flex align-items-center mb-3">
      <hr class="flex-grow-1 border-secondary-subtle">
      <span class="mx-2 text-muted small text-uppercase fw-semibold" style="font-size: 0.72rem; letter-spacing: 0.5px;">or sign in with email</span>
      <hr class="flex-grow-1 border-secondary-subtle">
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <!-- Email Field -->
      <div class="mb-3">
        <label for="email" class="form-label fw-semibold text-secondary small">Email Address</label>
        <input
          type="email"
          id="email"
          name="email"
          class="form-control glass-input w-100"
          placeholder="name@example.com"
          [(ngModel)]="email"
          required
        />
      </div>

      <!-- Password Field -->
      <div class="mb-4">
        <div class="d-flex justify-content-between align-items-center">
          <label for="password" class="form-label fw-semibold text-secondary small mb-1">Password</label>
        </div>
        <input
          type="password"
          id="password"
          name="password"
          class="form-control glass-input w-100"
          placeholder="••••••••"
          [(ngModel)]="password"
          required
        />
      </div>

      <!-- Submit Button -->
      <button type="submit" class="btn btn-teal-premium w-100 py-3 d-flex align-items-center justify-content-center gap-2" [disabled]="isLoading()">
        @if (isLoading()) {
          <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
          <span>Signing in...</span>
        } @else {
          <span class="material-icons" style="font-size: 1.25rem;">login</span>
          <span>Sign In</span>
        }
      </button>

      <!-- Toggle Mode Link -->
      <div class="text-center mt-4">
        <p class="text-muted small mb-0">
          Don't have an account?
          <a routerLink="/register" class="fw-bold text-teal" style="text-decoration: none; color: #10b981;">Sign Up</a>
        </p>
      </div>
    </form>
  </div>
</div>
